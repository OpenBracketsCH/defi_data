name: Reporting für Bern
on:
  workflow_run:
    workflows: ["Get data from Overpass"]
    types: [completed]
  workflow_dispatch:
jobs:
  diff-and-mail:
    if: >
      (github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success') &&
      github.event.workflow_run.head_commit.author.name != 'defikarte.ch Reporting Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: SHA des letzten GeoJSON-Commits ermitteln
        run: |
          set -euo pipefail
          GEOJSON_SHA="$(git log -1 --format=%H -- data/json/defis_kt_be.geojson)"
          echo "GEOJSON_SHA=$GEOJSON_SHA" >> $GITHUB_ENV

      - name: Letzten verarbeiteten SHA laden (Cache)
        id: cache-sha
        uses: actions/cache@v4
        with:
          path: .cache/last_processed_be.txt
          key: last-processed-be-${{ env.GEOJSON_SHA }}
          restore-keys: last-processed-be-

      - name: Prüfen ob bereits verarbeitet
        run: |
          set -euo pipefail
          mkdir -p .cache
          if [ "${{ steps.cache-sha.outputs.cache-hit }}" = "true" ]; then
            echo "ALREADY_PROCESSED=true" >> $GITHUB_ENV
            echo "Cache hit – bereits verarbeitet."
          else
            echo "ALREADY_PROCESSED=false" >> $GITHUB_ENV
            echo "Neuer SHA – wird verarbeitet."
          fi

      - name: Stop early if already processed
        if: env.ALREADY_PROCESSED == 'true'
        run: |
          echo "Already processed; skipping mail."
          exit 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prüfen ob GeoJSON geändert
        run: |
          set -euo pipefail
          if git diff --quiet ${GEOJSON_SHA}^..${GEOJSON_SHA} -- data/json/defis_kt_be.geojson; then
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Diff erstellen (sofort + pending)
        if: env.CHANGED == 'true'
        run: |
          set -euo pipefail
          python scripts/geojson_diff_be.py \
            <(git show ${GEOJSON_SHA}^:data/json/defis_kt_be.geojson) \
            data/json/defis_kt_be.geojson \
            .reporting/pending_changes_be.json

      - name: Prüfen ob diff_immediate.html existiert
        run: |
          if [ -f diff_immediate.html ]; then
            echo "DIFF_EXISTS=true" >> $GITHUB_ENV
          else
            echo "DIFF_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Mail versenden (neu + gelöscht)
        if: env.DIFF_EXISTS == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: asmtp.mail.hostpoint.ch
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: "Neue/gelöschte Defis – Kanton Bern"
          html_body: file://diff_immediate.html
          to: ${{ secrets.MAIL_RECIPIENT_BE }}
          cc: ${{ secrets.MAIL_COPY }}
          from: defikarte.ch Reports

      - name: Pending changes committen
        if: env.CHANGED == 'true'
        run: |
          set -euo pipefail
          mkdir -p .reporting

          git config user.name "defikarte.ch Reporting Bot"
          git config user.email "chrigi@chnuessli.ch"

          if [ -f .reporting/pending_changes_be.json ]; then
            git add .reporting/pending_changes_be.json
            git diff --cached --quiet || git commit -m "update pending changes BE"
            git push origin HEAD:main || true
          fi

      - name: SHA im Cache speichern
        run: |
          mkdir -p .cache
          echo "$GEOJSON_SHA" > .cache/last_processed_be.txt
