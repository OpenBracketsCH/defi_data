name: Reporting für Basel
on:
  workflow_run:
    workflows: ["Get data from Overpass"]
    types: [completed]
  workflow_dispatch:
jobs:
  diff-and-mail:
    if: >
      (github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success') &&
      github.event.workflow_run.head_commit.author.name != 'defikarte.ch Reporting Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: SHA des letzten GeoJSON-Commits ermitteln
        run: |
          set -euo pipefail
          GEOJSON_SHA="$(git log -1 --format=%H -- data/json/defis_dispo_basel.geojson)"
          echo "GEOJSON_SHA=$GEOJSON_SHA" >> $GITHUB_ENV

      - name: Letzten verarbeiteten SHA laden (Cache)
        id: cache-sha
        uses: actions/cache@v4
        with:
          path: .cache/last_processed_bl.txt
          key: last-processed-bl-${{ env.GEOJSON_SHA }}
          restore-keys: last-processed-bl-

      - name: Prüfen ob bereits verarbeitet
        run: |
          set -euo pipefail
          mkdir -p .cache
          if [ "${{ steps.cache-sha.outputs.cache-hit }}" = "true" ]; then
            echo "ALREADY_PROCESSED=true" >> $GITHUB_ENV
            echo "Cache hit – bereits verarbeitet."
          else
            echo "ALREADY_PROCESSED=false" >> $GITHUB_ENV
            echo "Neuer SHA – wird verarbeitet."
          fi

      - name: Stop early if already processed
        if: env.ALREADY_PROCESSED == 'true'
        run: |
          echo "Already processed; skipping mail."
          exit 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prüfen ob GeoJSON geändert
        run: |
          set -euo pipefail
          if git diff --quiet ${GEOJSON_SHA}^..${GEOJSON_SHA} -- data/json/defis_dispo_basel.geojson; then
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Diff HTML erstellen
        if: env.CHANGED == 'true'
        run: |
          set -euo pipefail
          python scripts/geojson_diff.py \
            <(git show ${GEOJSON_SHA}^:data/json/defis_dispo_basel.geojson) \
            data/json/defis_dispo_basel.geojson

      - name: Prüfen ob diff.html existiert
        run: |
          if [ -f diff.html ]; then
            echo "DIFF_EXISTS=true" >> $GITHUB_ENV
          else
            echo "DIFF_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Mail versenden
        if: env.DIFF_EXISTS == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: asmtp.mail.hostpoint.ch
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: "Änderungen an Defis Kanton Basel"
          html_body: file://diff.html
          to: ${{ secrets.MAIL_RECIPIENT_BL }}
          cc: ${{ secrets.MAIL_COPY }}
          from: defikarte.ch Reports

      - name: SHA im Cache speichern
        run: |
          mkdir -p .cache
          echo "$GEOJSON_SHA" > .cache/last_processed_bl.txt
